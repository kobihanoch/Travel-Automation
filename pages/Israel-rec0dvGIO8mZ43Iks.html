<!DOCTYPE html><html dir="rtl" lang="he"><head><style>body {background-color: #4567b7;font-family: Arial, sans-serif;} .hero {background-image: linear-gradient(to bottom, #2f4f7f, #3a5f8f);color: white;padding: 20px;text-align: center;} .attractions-grid {display: grid;grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));gap: 20px;padding: 20px;max-width: 1200px;margin: 0 auto;} .card {background-color: white;box-shadow: 0 10px 20px rgba(0,0,0,0.1);border-radius: 12px;padding: 20px;} .card img {width: 100%;height: 200px;object-fit: cover;border-radius: 8px 8px 0 0;}</style></head><body><div class="hero"><h1>ישראל</h1></div><div class="attractions-grid"><div class="card"><h2>הכותל המערבי</h2><p>אתר מקודש ליהודים, שריד לחומה המערבית של הר הבית</p><img id="img-attraction-1" src="https://images.unsplash.com/photo-1547483029-77784da27709?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w5NzcwNzJ8MHwxfHNlYXJjaHwxfHxJc3JhZWx8ZW58MHx8fHwxNzgxNDQ5Mjc1fDA&ixlib=rb-4.1.0&q=80&w=1080" style="width:100%; height:200px; object-fit:cover; border-radius:8px 8px 0 0;" /></div><div class="card"><h2>טיילת תל אביב</h2><p>טיילת יפהפייה לאורך חוף הים של תל אביב, מושכת תיירים ומקומיים</p><img id="img-attraction-2" src="https://images.unsplash.com/photo-1592990022203-9537952f9c84?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w5NzcwNzJ8MHwxfHNlYXJjaHwyfHxJc3JhZWx8ZW58MHx8fHwxNzgxNDQ5Mjc1fDA&ixlib=rb-4.1.0&q=80&w=1080" style="width:100%; height:200px; object-fit:cover; border-radius:8px 8px 0 0;" /></div><div class="card"><h2>מצדה</h2><p>אתר היסטורי עתיק, הממוקם על ראש צוק, המספר על ההיסטוריה העשירה של האזור</p><img id="img-attraction-3" src="https://images.unsplash.com/photo-1614517453351-6c1522fc7a56?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w5NzcwNzJ8MHwxfHNlYXJjaHwzfHxJc3JhZWx8ZW58MHx8fHwxNzgxNDQ5Mjc1fDA&ixlib=rb-4.1.0&q=80&w=1080" style="width:100%; height:200px; object-fit:cover; border-radius:8px 8px 0 0;" /></div></div><div id="map-container" style="height:450px; width:100%; max-width:1200px; margin:40px auto; border-radius:12px; box-shadow:0 10px 20px rgba(0,0,0,0.1); border: 2px solid #ccc; z-index: 1; position: relative;"></div>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
window.onload = function() {
  const mapElement = document.getElementById('map-container');
  if (!mapElement) return;

  const map = L.map('map-container').setView(
    [31.7767, 35.2347],
    12
  );

  L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom: 19, attribution: '© OpenStreetMap' }
  ).addTo(map);

  
      L.marker([31.7767, 35.2347])
        .addTo(map)
        .bindPopup("<div style='text-align:right;font-family:sans-serif;'><b>הכותל המערבי</b></div>");
    

      L.marker([32.0853, 34.7733])
        .addTo(map)
        .bindPopup("<div style='text-align:right;font-family:sans-serif;'><b>טיילת תל אביב</b></div>");
    

      L.marker([31.3294, 35.3536])
        .addTo(map)
        .bindPopup("<div style='text-align:right;font-family:sans-serif;'><b>מצדה</b></div>");
    

  setTimeout(() => { map.invalidateSize(); }, 500);
};
</script>

</body></html>
